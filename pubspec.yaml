name: note
description: A modern notes & tasks app built with Flutter.
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons.
  cupertino_icons: ^1.0.8
  # Pinterest-style masonry grid for notes (modern replacement for the
  # removed StaggeredGridView.countBuilder API).
  flutter_staggered_grid_view: ^0.7.0
  # Date/number formatting.
  intl: ^0.20.2
  # State management, dependency injection and navigation.
  get: ^4.6.6
  # Local SQLite storage.
  sqflite: ^2.4.1
  # Cross-platform path joining (used by the database layer).
  path: ^1.9.0
  # Scheduled local notifications (task reminders).
  flutter_local_notifications: ^19.4.2
  # Timezone database + resolving the device's local zone for accurate
  # scheduling across DST.
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # In-memory/desktop SQLite so the database layer can be unit-tested in CI.
  sqflite_common_ffi: ^2.3.5

# sqflite_common_ffi 2.3.5 targets the sqlite3 2.x `open` API; without this the
# resolver pulls sqlite3 3.x and its desktop setup fails to compile. Drop this
# override once the toolchain reaches Dart >=3.12 (allowing sqflite_common_ffi
# 2.4.x, which supports sqlite3 3.x).
dependency_overrides:
  sqlite3: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
